{% if is_pdf %}
    <iframe src="{{ file.url }}" width="100%" height="500" style="border: 1px solid #ccc; border-radius: 4px; display: block;" title="{{ file.name }}"></iframe>
{% elif is_image %}
    <img src="{{ file.url }}" alt="{{ file.name }}" style="max-width: 100%; height: auto; border: 1px solid #ccc; border-radius: 4px; display: block;" />
{% else %}
    <p><em>No inline preview available for this file type.</em></p>
{% endif %}
